<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky - My AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 750px; height: 90vh; display: flex; flex-direction: column; background: #16213e; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .header { background: #0f3460; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; color: #e94560; }
        .header p { font-size: 13px; color: #aaa; margin-top: 4px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; }
        .user-message { background: #e94560; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background: #0f3460; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .typing { color: #aaa; font-style: italic; font-size: 14px; align-self: flex-start; padding: 8px 16px; }
        .input-area { padding: 16px; background: #0f3460; display: flex; gap: 10px; }
        input[type=text] { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; background: #1a1a2e; color: #eee; font-size: 15px; outline: none; }
        input[type=text]::placeholder { color: #666; }
        button { padding: 12px 20px; border-radius: 24px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }
        #send-btn { background: #e94560; color: white; }
        #clear-btn { background: #333; color: #aaa; }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lucky</h1>
            <p>Your Personal AI Assistant</p>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">Hi! I'm Lucky, your personal AI assistant. How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." />
            <button id="send-btn">Send</button>
            <button id="clear-btn">Clear</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");

        function addMessage(text, sender) {
            const msg = document.createElement("div");
            msg.classList.add("message", sender === "user" ? "user-message" : "bot-message");
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            addMessage(message, "user");
            userInput.value = "";
            const typing = document.createElement("div");
            typing.classList.add("typing");
            typing.id = "typing";
            typing.innerText = "Lucky is typing...";
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            document.getElementById("typing").remove();
            addMessage(data.reply, "bot");
        }

        document.getElementById("send-btn").addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
        document.getElementById("clear-btn").addEventListener("click", async () => {
            await fetch("/clear", { method: "POST" });
            chatBox.innerHTML = '<div class="message bot-message">Conversation cleared! How can I help you?</div>';
        });
    </script>
</body>
</html>
